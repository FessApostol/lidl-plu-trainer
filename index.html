<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LIDL PLU">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LIDL PLU Trainer</title>
<style>
:root {
  --lidl-blue:#0050aa;
  --lidl-yellow:#fff000;
  --lidl-red:#f0141e;
  --pos-blue:#59c3dd;
  --pos-green:#8fbe87;
  --pos-green-dark:#79aa70;
  --bg:#eef2f6;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  width:100%;
  min-height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
button { font-family:inherit; border:0; cursor:pointer; }
#app {
  width:100%;
  height:100svh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
@supports (height: 100dvh) { #app { height:100dvh; } }
#menu {
  height:100%;
  padding:calc(18px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.logo {
  width:82px;
  height:82px;
  background:var(--lidl-blue);
  border:4px solid var(--lidl-red);
  border-radius:22px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:21px;
  margin-bottom:18px;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}
h1 { margin:0 0 6px; color:var(--text); font-size:24px; }
.sub { color:var(--muted); font-size:14px; margin-bottom:18px; }
.menu-btn {
  width:100%;
  max-width:340px;
  min-height:56px;
  margin:7px 0;
  border-radius:14px;
  background:white;
  color:var(--lidl-blue);
  font-size:17px;
  font-weight:800;
  box-shadow:0 4px 10px rgba(0,0,0,.10);
}
.menu-btn:active { transform:scale(.985); }
.menu-btn.danger { color:var(--lidl-red); font-size:12px; min-height:44px; margin-top:22px; }
#game {
  display:none;
  height:100%;
  grid-template-rows:auto minmax(210px, 1fr) auto;
  overflow:hidden;
}
.header {
  padding:calc(6px + env(safe-area-inset-top)) 8px 7px;
  background:var(--lidl-blue);
  color:white;
  display:flex;
  align-items:center;
  gap:10px;
}
.close {
  width:38px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
}
.progress-bg {
  flex:1;
  height:8px;
  background:rgba(255,255,255,.25);
  border-radius:20px;
  overflow:hidden;
}
#progress-bar {
  width:0%;
  height:100%;
  background:var(--lidl-yellow);
  border-radius:20px;
  transition:width .25s ease;
}
#stat-count { min-width:56px; text-align:right; font-size:12px; font-weight:800; }
.card-container {
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px 6px;
  perspective:1000px;
}
.card {
  width:100%;
  max-width:330px;
  height:min(255px, 32svh);
  min-height:205px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .35s ease;
}
@supports (height: 100dvh) { .card { height:min(255px, 32dvh); } }
.card.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:22px;
  background:var(--card);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:14px 14px 12px;
  box-shadow:0 12px 28px rgba(0,0,0,.16);
  border:1px solid rgba(0,0,0,.06);
  overflow:hidden;
}
.card-back {
  transform:rotateY(180deg);
  background:linear-gradient(180deg, #fff56a, var(--lidl-yellow));
  color:var(--lidl-blue);
  font-size:78px;
  line-height:1;
  font-weight:950;
  letter-spacing:.5px;
}
.product-img {
  max-width:100%;
  width:min(74%, 240px);
  max-height:110px;
  object-fit:contain;
  margin-top:8px;
  margin-bottom:8px;
  flex:0 0 auto;
}
.product-name {
  width:100%;
  font-size:clamp(17px, 4.8vw, 23px);
  line-height:1.12;
  font-weight:900;
  text-align:center;
  color:var(--text);
}
.product-ru {
  width:100%;
  margin-top:4px;
  font-size:clamp(12px, 3.2vw, 15px);
  line-height:1.18;
  font-weight:700;
  text-align:center;
  color:#334155;
}
.product-meta {
  width:100%;
  margin-top:4px;
  font-size:11px;
  line-height:1.2;
  text-align:center;
  color:var(--muted);
}
.hint {
  position:absolute;
  right:10px;
  top:10px;
  min-width:32px;
  height:32px;
  padding:0 8px;
  border-radius:999px;
  background:#eff6ff;
  color:var(--lidl-blue);
  align-items:center;
  justify-content:center;
  display:none;
  font-weight:900;
  font-size:12px;
}
.input-section {
  background:#f8fafc;
  border-top:1px solid rgba(0,0,0,.10);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.input-line {
  display:grid;
  grid-template-columns:1fr 60px;
  gap:6px;
  margin-bottom:6px;
}
#plu-display {
  height:44px;
  border:3px solid var(--lidl-blue);
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  color:var(--text);
  font-size:28px;
  font-weight:950;
  letter-spacing:3px;
}
.pos-c {
  height:44px;
  background:white;
  color:#000;
  font-size:20px;
  border-radius:0;
  box-shadow:0 1px 0 rgba(0,0,0,.08);
}
.pos-pad {
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr)) minmax(64px, .88fr);
  grid-template-rows:repeat(4, clamp(46px, 6.3svh, 58px));
  gap:6px;
}
@supports (height: 100dvh) { .pos-pad { grid-template-rows:repeat(4, clamp(46px, 6.3dvh, 58px)); } }
.key {
  background:var(--pos-blue);
  color:#050505;
  border-radius:0;
  font-size:clamp(24px, 7vw, 36px);
  font-weight:500;
  display:flex;
  align-items:center;
  justify-content:center;
}
.key:active, .pos-c:active, .plu-key:active { filter:brightness(.92); transform:scale(.99); }
.plu-key {
  grid-row:1 / span 2;
  grid-column:4;
  background:var(--pos-green-dark);
  color:#050505;
  border-radius:0;
  font-size:16px;
  font-weight:500;
}
.ok-key {
  grid-row:3 / span 2;
  grid-column:4;
  background:linear-gradient(180deg, rgba(143,190,135,.55), rgba(143,190,135,.12));
  color:#0f172a;
  border-radius:0;
  font-size:16px;
  font-weight:800;
}
.key-disabled {
  background:#a8dbec;
  color:rgba(0,0,0,.45);
}
.feedback {
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%) scale(.92);
  padding:15px 20px;
  border-radius:18px;
  color:white;
  font-size:18px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.18s ease;
  z-index:20;
}
.feedback.show { opacity:1; transform:translate(-50%, -50%) scale(1); }
.feedback.ok { background:#16a34a; }
.feedback.bad { background:#dc2626; }
@media (max-height: 720px) {
  .product-img { width:min(70%, 220px); max-height:96px; margin-top:4px; margin-bottom:6px; }
  .card { height:min(225px, 29svh); min-height:180px; }
  .card-face { padding:10px 12px; }
  .product-name { font-size:clamp(16px, 4vw, 20px); }
  .product-ru { font-size:clamp(11px, 3vw, 14px); margin-top:3px; }
  .product-meta { display:none; }
  .pos-pad { grid-template-rows:repeat(4, 44px); gap:5px; }
  #plu-display, .pos-c { height:40px; }
  .input-line { gap:5px; margin-bottom:5px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="menu">
    <div class="logo">LIDL</div>
    <h1>PLU Trainer</h1>
    <div class="sub"><span id="total-val">116</span> товаров. Прогресс хранится на этом телефоне.</div>
    <button class="menu-btn" onclick="start('all')">Учить все (<span id="all-val">116</span>)</button>
    <button class="menu-btn" onclick="start('unlearned')">Неизученные (<span id="un-val">0</span>)</button>
    <button class="menu-btn" onclick="start('learned')">Изученные (<span id="l-val">0</span>)</button>
    <button class="menu-btn danger" onclick="resetProgress()">Сбросить прогресс</button>
  </div>

  <div id="game">
    <div class="header">
      <button class="close" onclick="stop()">×</button>
      <div class="progress-bg"><div id="progress-bar"></div></div>
      <div id="stat-count">0/116</div>
    </div>

    <div class="card-container">
      <div class="card" id="card" onclick="revealAsWrong()">
        <div class="card-face">
          <div class="hint" id="hint"></div>
          <img id="img" class="product-img" src="" alt="" referrerpolicy="no-referrer">
          <div id="name" class="product-name"></div>
          <div id="name-ru" class="product-ru"></div>
          <div id="meta" class="product-meta"></div>
        </div>
        <div class="card-face card-back" id="back"></div>
      </div>
    </div>

    <div class="input-section">
      <div class="input-line">
        <div id="plu-display"></div>
        <button class="pos-c" onclick="clr()">C</button>
      </div>
      <div class="pos-pad">
        <button class="key" onclick="tap('7')">7</button>
        <button class="key" onclick="tap('8')">8</button>
        <button class="key" onclick="tap('9')">9</button>
        <button class="plu-key" onclick="ok()">PLU</button>

        <button class="key" onclick="tap('4')">4</button>
        <button class="key" onclick="tap('5')">5</button>
        <button class="key" onclick="tap('6')">6</button>

        <button class="key" onclick="tap('1')">1</button>
        <button class="key" onclick="tap('2')">2</button>
        <button class="key" onclick="tap('3')">3</button>
        <button class="ok-key" onclick="ok()">OK</button>

        <button class="key" onclick="tap('0')">0</button>
        <button class="key" onclick="tap('00')">00</button>
        <button class="key key-disabled" onclick="noop()">,</button>
      </div>
    </div>
  </div>
</div>
<div id="feedback" class="feedback"></div>

const STORAGE_KEY = "lidl_plu_learned_v3";
let learned = loadLearned();
let queue = [];
let curr = null;
let val = "";
let sessionTotal = 0;
let locked = false;

function storageAvailable() {
  try {
    const test = "__lidl_storage_test__";
    localStorage.setItem(test, test);
    localStorage.removeItem(test);
    return true;
  } catch (e) { return false; }
}
const canStore = storageAvailable();

function loadLearned() {
  try {
    const rawV3 = localStorage.getItem(STORAGE_KEY);
    if (rawV3) {
      const arr = JSON.parse(rawV3);
      return Array.isArray(arr) ? arr.map(String) : [];
    }
    const rawV2 = localStorage.getItem("lidl_plu_learned_v2");
    if (rawV2) {
      const arr = JSON.parse(rawV2);
      return Array.isArray(arr) ? arr.map(String) : [];
    }
    return [];
  } catch (e) { return []; }
}
function saveLearned() {
  if (!canStore) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...new Set(learned)]));
}
function markLearned(plu) {
  plu = String(plu);
  if (!learned.includes(plu)) learned.push(plu);
  saveLearned();
}
function markUnlearned(plu) {
  plu = String(plu);
  learned = learned.filter(x => x !== plu);
  saveLearned();
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function updateMenuStats() {
  const valid = new Set(db.map(x => x.p));
  const clean = learned.filter(p => valid.has(p));
  if (clean.length !== learned.length) { learned = clean; saveLearned(); }
  const total = db.length;
  const learnedCount = learned.length;
  document.getElementById("total-val").innerText = total;
  document.getElementById("all-val").innerText = total;
  document.getElementById("un-val").innerText = total - learnedCount;
  document.getElementById("l-val").innerText = learnedCount;
}
function start(mode) {
  if (mode === "all") queue = [...db];
  else if (mode === "unlearned") queue = db.filter(x => !learned.includes(x.p));
  else queue = db.filter(x => learned.includes(x.p));
  if (queue.length === 0) { alert("Список пуст."); updateMenuStats(); return; }
  shuffle(queue);
  sessionTotal = queue.length;
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "grid";
  next();
}
function stop() {
  document.getElementById("menu").style.display = "flex";
  document.getElementById("game").style.display = "none";
  updateMenuStats();
}
function next() {
  locked = false;
  if (queue.length === 0) { showFeedback("Готово", true); stop(); return; }
  curr = queue[0];
  val = "";
  const img = document.getElementById("img");
  img.src = curr.i;
  img.alt = curr.n;
  img.onerror = function() { this.style.display = "none"; };
  img.onload = function() { this.style.display = "block"; };
  document.getElementById("name").innerText = curr.n;
  document.getElementById("name-ru").innerText = curr.ru || "";
  document.getElementById("meta").innerText = [curr.c, curr.g].filter(Boolean).join(" - ");
  document.getElementById("hint").innerText = curr.h || "";
  document.getElementById("hint").style.display = curr.h ? "flex" : "none";
  document.getElementById("back").innerText = curr.p;
  document.getElementById("card").classList.remove("flipped");
  updateDisplay();
  updateProgress();
}
function updateProgress() {
  const done = sessionTotal - queue.length;
  document.getElementById("stat-count").innerText = `${done}/${sessionTotal}`;
  document.getElementById("progress-bar").style.width = sessionTotal ? (done / sessionTotal * 100) + "%" : "0%";
}
function tap(n) {
  if (locked || !curr) return;
  const free = 4 - val.length;
  if (free <= 0) return;
  val += String(n).slice(0, free);
  updateDisplay();
}
function noop() {}
function clr() { if (!locked) { val = ""; updateDisplay(); } }
function updateDisplay() { document.getElementById("plu-display").innerText = val; }
function showFeedback(text, isOk) {
  const el = document.getElementById("feedback");
  el.textContent = text;
  el.className = "feedback show " + (isOk ? "ok" : "bad");
  setTimeout(() => { el.className = "feedback"; }, 850);
}
function correctCurrent() {
  markLearned(curr.p);
  queue.shift();
  showFeedback("Верно", true);
  next();
}
function failCurrent(text = "Неверно") {
  markUnlearned(curr.p);
  const failed = queue.shift();
  queue.push(failed);
  showFeedback(text, false);
  setTimeout(next, 1050);
}
function ok() {
  if (locked || !curr) return;
  locked = true;
  if (val === curr.p) correctCurrent();
  else { document.getElementById("card").classList.add("flipped"); failCurrent("Неверно"); }
}
function revealAsWrong() {
  if (locked || !curr) return;
  locked = true;
  document.getElementById("card").classList.add("flipped");
  failCurrent("Открыто");
}
function resetProgress() {
  if (confirm("Сбросить весь прогресс?")) {
    learned = [];
    if (canStore) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem("lidl_plu_learned_v2");
    }
    updateMenuStats();
  }
}
window.addEventListener("load", updateMenuStats);
</script>
