<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LIDL PLU">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LIDL PLU Trainer - 116</title>
<style>
:root {
  --blue:#0050aa;
  --yellow:#fff000;
  --red:#f0141e;
  --green:#34c759;
  --bg:#f0f2f5;
  --text:#1f2937;
  --muted:#6b7280;
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
button { font-family:inherit; cursor:pointer; }
#app {
  height:100dvh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
#menu {
  height:100%;
  padding:calc(18px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.logo {
  width:78px;
  height:78px;
  background:var(--blue);
  border:4px solid var(--red);
  border-radius:22px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:21px;
  margin-bottom:18px;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}
h1 {
  margin:0 0 6px;
  color:var(--text);
  font-size:24px;
}
.sub {
  color:var(--muted);
  font-size:14px;
  margin-bottom:18px;
}
.menu-btn {
  width:100%;
  max-width:330px;
  min-height:56px;
  margin:7px 0;
  border:0;
  border-radius:14px;
  background:white;
  color:var(--blue);
  font-size:17px;
  font-weight:700;
  box-shadow:0 4px 10px rgba(0,0,0,.10);
}
.menu-btn:active { transform:scale(.985); }
.menu-btn.danger {
  color:var(--red);
  font-size:13px;
  min-height:44px;
  margin-top:22px;
}
#game {
  display:none;
  height:100%;
  flex-direction:column;
}
.header {
  padding:calc(9px + env(safe-area-inset-top)) 10px 10px;
  background:var(--blue);
  color:white;
  display:flex;
  align-items:center;
  gap:10px;
}
.close {
  width:42px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
}
.progress-bg {
  flex:1;
  height:9px;
  background:rgba(255,255,255,.25);
  border-radius:20px;
  overflow:hidden;
}
#progress-bar {
  width:0%;
  height:100%;
  background:var(--yellow);
  border-radius:20px;
  transition:width .25s ease;
}
#stat-count {
  min-width:62px;
  text-align:right;
  font-size:13px;
  font-weight:800;
}
.card-container {
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  perspective:1000px;
}
.card {
  width:100%;
  max-width:340px;
  height:min(370px, 52dvh);
  min-height:300px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .35s ease;
}
.card.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:22px;
  background:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.16);
  border:1px solid rgba(0,0,0,.08);
}
.card-back {
  transform:rotateY(180deg);
  background:var(--yellow);
  color:var(--blue);
  font-size:82px;
  font-weight:900;
  letter-spacing:1px;
}
.product-img {
  width:100%;
  max-height:220px;
  object-fit:contain;
}
.product-name {
  margin-top:14px;
  font-size:19px;
  line-height:1.2;
  font-weight:800;
  text-align:center;
  color:var(--text);
}
.product-meta {
  margin-top:7px;
  color:var(--muted);
  font-size:12px;
  text-align:center;
}
.hint {
  position:absolute;
  top:10px;
  right:12px;
  min-width:28px;
  height:28px;
  padding:0 7px;
  border-radius:99px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eef2ff;
  color:var(--blue);
  font-size:12px;
  font-weight:900;
}
.input-section {
  background:white;
  border-top:1px solid #ddd;
  padding:12px 14px calc(18px + env(safe-area-inset-bottom));
}
#plu-display {
  height:48px;
  border:2px solid var(--blue);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:29px;
  font-weight:900;
  letter-spacing:3px;
  background:#f9fafb;
  color:var(--text);
  margin-bottom:9px;
}
.numpad {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
}
.btn {
  min-height:46px;
  border:0;
  border-radius:12px;
  background:#e5e7eb;
  color:#111827;
  font-size:22px;
  font-weight:800;
}
.btn:active { transform:scale(.98); background:#d1d5db; }
.btn-green { background:var(--green); color:white; }
.btn-red { background:var(--red); color:white; }
.feedback {
  position:fixed;
  left:50%;
  top:calc(18px + env(safe-area-inset-top));
  transform:translateX(-50%);
  z-index:20;
  padding:10px 14px;
  border-radius:999px;
  color:white;
  font-size:14px;
  font-weight:800;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}
.feedback.show { opacity:1; }
.feedback.ok { background:var(--green); }
.feedback.bad { background:var(--red); }
</style>
</head>
<body>
<div id="app">
  <div id="menu">
    <div class="logo">LIDL</div>
    <h1>PLU Trainer</h1>
    <div class="sub">Всего товаров: <b id="total-val">0</b></div>

    <button class="menu-btn" onclick="start('all')">Учить все (<span id="all-val">0</span>)</button>
    <button class="menu-btn" onclick="start('unlearned')">Неизученные (<span id="un-val">0</span>)</button>
    <button class="menu-btn" onclick="start('learned')">Изученные (<span id="l-val">0</span>)</button>

    <button class="menu-btn danger" onclick="resetProgress()">Сбросить прогресс</button>
  </div>

  <div id="game">
    <div class="header">
      <div class="close" onclick="stop()">×</div>
      <div class="progress-bg"><div id="progress-bar"></div></div>
      <div id="stat-count">0/0</div>
    </div>

    <div class="card-container">
      <div class="card" id="card" onclick="revealAsWrong()">
        <div class="card-face">
          <div class="hint" id="hint"></div>
          <img id="img" class="product-img" src="" alt="" referrerpolicy="no-referrer">
          <div id="name" class="product-name"></div>
          <div id="meta" class="product-meta"></div>
        </div>
        <div class="card-face card-back" id="back"></div>
      </div>
    </div>

    <div class="input-section">
      <div id="plu-display"></div>
      <div class="numpad">
        <button class="btn" onclick="tap('1')">1</button>
        <button class="btn" onclick="tap('2')">2</button>
        <button class="btn" onclick="tap('3')">3</button>
        <button class="btn" onclick="tap('4')">4</button>
        <button class="btn" onclick="tap('5')">5</button>
        <button class="btn" onclick="tap('6')">6</button>
        <button class="btn" onclick="tap('7')">7</button>
        <button class="btn" onclick="tap('8')">8</button>
        <button class="btn" onclick="tap('9')">9</button>
        <button class="btn btn-red" onclick="clr()">C</button>
        <button class="btn" onclick="tap('0')">0</button>
        <button class="btn btn-green" onclick="ok()">OK</button>
      </div>
    </div>
  </div>
</div>

<div id="feedback" class="feedback"></div>

const STORAGE_KEY = "lidl_plu_learned_v2";
let learned = loadLearned();
let queue = [];
let curr = null;
let val = "";
let sessionTotal = 0;
let sessionDone = 0;
let locked = false;

function storageAvailable() {
  try {
    const test = "__test__";
    localStorage.setItem(test, test);
    localStorage.removeItem(test);
    return true;
  } catch (e) {
    return false;
  }
}

const canStore = storageAvailable();

function loadLearned() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr.map(String) : [];
  } catch (e) {
    return [];
  }
}

function saveLearned() {
  if (!canStore) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...new Set(learned)]));
}

function markLearned(plu) {
  plu = String(plu);
  if (!learned.includes(plu)) learned.push(plu);
  saveLearned();
}

function markUnlearned(plu) {
  plu = String(plu);
  learned = learned.filter(x => x !== plu);
  saveLearned();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateMenuStats() {
  const learnedClean = learned.filter(p => db.some(x => x.p === p));
  if (learnedClean.length !== learned.length) {
    learned = learnedClean;
    saveLearned();
  }
  const total = db.length;
  const learnedCount = learned.length;
  document.getElementById("total-val").innerText = total;
  document.getElementById("all-val").innerText = total;
  document.getElementById("un-val").innerText = total - learnedCount;
  document.getElementById("l-val").innerText = learnedCount;
}

function start(mode) {
  if (mode === "all") queue = [...db];
  else if (mode === "unlearned") queue = db.filter(x => !learned.includes(x.p));
  else queue = db.filter(x => learned.includes(x.p));

  if (queue.length === 0) {
    alert("Список пуст.");
    updateMenuStats();
    return;
  }

  shuffle(queue);
  sessionTotal = queue.length;
  sessionDone = 0;
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "flex";
  next();
}

function stop() {
  document.getElementById("menu").style.display = "flex";
  document.getElementById("game").style.display = "none";
  updateMenuStats();
}

function next() {
  locked = false;
  if (queue.length === 0) {
    showFeedback("Готово", true);
    stop();
    return;
  }

  curr = queue[0];
  val = "";

  const img = document.getElementById("img");
  img.src = curr.i;
  img.alt = curr.n;
  img.onerror = function() {
    this.style.display = "none";
  };
  img.onload = function() {
    this.style.display = "block";
  };

  document.getElementById("name").innerText = curr.n;
  document.getElementById("meta").innerText = [curr.c, curr.g].filter(Boolean).join(" - ");
  document.getElementById("hint").innerText = curr.h || "";
  document.getElementById("hint").style.display = curr.h ? "flex" : "none";
  document.getElementById("back").innerText = curr.p;
  document.getElementById("card").classList.remove("flipped");

  updateDisplay();
  updateProgress();
}

function updateProgress() {
  const done = sessionDone;
  document.getElementById("stat-count").innerText = `${done}/${sessionTotal}`;
  document.getElementById("progress-bar").style.width = sessionTotal ? (done / sessionTotal * 100) + "%" : "0%";
}

function tap(n) {
  if (locked || !curr) return;
  if (val.length < 4) {
    val += n;
    updateDisplay();
  }
}

function clr() {
  if (locked) return;
  val = "";
  updateDisplay();
}

function updateDisplay() {
  document.getElementById("plu-display").innerText = val;
}

function showFeedback(text, isOk) {
  const el = document.getElementById("feedback");
  el.textContent = text;
  el.className = "feedback show " + (isOk ? "ok" : "bad");
  setTimeout(() => {
    el.className = "feedback";
  }, 900);
}

function correctCurrent() {
  markLearned(curr.p);
  queue.shift();
  sessionDone += 1;
  showFeedback("Верно", true);
  next();
}

function failCurrent() {
  markUnlearned(curr.p);
  const failed = queue.shift();
  queue.push(failed);
  showFeedback("Неверно", false);
  sessionDone += 1;
  setTimeout(next, 1100);
}

function ok() {
  if (locked || !curr) return;
  locked = true;
  if (val === curr.p) {
    correctCurrent();
  } else {
    document.getElementById("card").classList.add("flipped");
    failCurrent();
  }
}

function revealAsWrong() {
  if (locked || !curr) return;
  locked = true;
  document.getElementById("card").classList.add("flipped");
  markUnlearned(curr.p);
  const failed = queue.shift();
  queue.push(failed);
  sessionDone += 1;
  showFeedback("Открыто - в неизученные", false);
  setTimeout(next, 1200);
}

function resetProgress() {
  if (confirm("Сбросить весь прогресс?")) {
    learned = [];
    if (canStore) localStorage.removeItem(STORAGE_KEY);
    updateMenuStats();
  }
}

window.addEventListener("load", updateMenuStats);
</script>
</body>
</html>
