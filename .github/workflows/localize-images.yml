name: Localize images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  localize-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download images and rewrite index.html
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re
          import time
          import unicodedata
          import urllib.parse
          import urllib.request

          html_path = pathlib.Path('index.html')
          if not html_path.exists():
              raise SystemExit('ERROR: index.html not found in repository root')

          html = html_path.read_text(encoding='utf-8')

          match = re.search(r'const db = (\[.*?\]);', html, flags=re.S)
          if not match:
              raise SystemExit('ERROR: const db = [...] block not found in index.html')

          db = json.loads(match.group(1))
          images_dir = pathlib.Path('images')
          images_dir.mkdir(exist_ok=True)

          def slugify(value: str, max_len: int = 70) -> str:
              value = unicodedata.normalize('NFKD', value)
              value = ''.join(ch for ch in value if not unicodedata.combining(ch))
              value = value.lower()
              value = re.sub(r'[^a-z0-9]+', '-', value)
              value = value.strip('-')
              return value[:max_len].strip('-') or 'product'

          downloaded = 0
          skipped = 0
          changed = False

          for item in db:
              url = item.get('i', '')
              if not url.startswith('http'):
                  skipped += 1
                  continue

              parsed = urllib.parse.urlparse(url)
              ext = pathlib.Path(parsed.path).suffix.lower() or '.webp'
              if ext not in ['.webp', '.png', '.jpg', '.jpeg']:
                  ext = '.webp'

              plu = str(item.get('p', 'plu')).strip() or 'plu'
              name = str(item.get('n', 'product')).strip() or 'product'
              filename = f"{plu}-{slugify(name)}{ext}"
              local_path = images_dir / filename
              local_ref = f"images/{filename}"

              if not local_path.exists():
                  request = urllib.request.Request(
                      url,
                      headers={
                          'User-Agent': 'Mozilla/5.0 (compatible; personal-plu-trainer-image-localizer)'
                      }
                  )
                  try:
                      with urllib.request.urlopen(request, timeout=30) as response:
                          data = response.read()
                      if len(data) < 500:
                          raise RuntimeError(f'image file too small: {len(data)} bytes')
                      local_path.write_bytes(data)
                      downloaded += 1
                      time.sleep(0.1)
                  except Exception as exc:
                      print(f"FAILED: {plu} {name} -> {url}: {exc}")
                      continue

              if item.get('i') != local_ref:
                  item['i'] = local_ref
                  changed = True

          new_db = json.dumps(db, ensure_ascii=False, separators=(',', ':'))
          html = html[:match.start(1)] + new_db + html[match.end(1):]

          noindex = '<meta name="robots" content="noindex,nofollow">'
          if noindex not in html:
              html = html.replace(
                  '<meta name="referrer" content="no-referrer">',
                  '<meta name="referrer" content="no-referrer">\n<meta name="robots" content="noindex,nofollow">'
              )
              changed = True

          html_path.write_text(html, encoding='utf-8')
          print(f"Downloaded: {downloaded}")
          print(f"Already local/skipped: {skipped}")
          print(f"Changed HTML: {changed}")
          PY

      - name: Commit changes
        run: |
          if git diff --quiet && [ -z "$(git status --short images)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html images
          git commit -m "Localize PLU images"
          git push
